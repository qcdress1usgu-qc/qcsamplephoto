<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FORM SAMPLE PHOTO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* --- PALET WARNA INDUSTRIAL SOFT BLUE --- */
        :root { 
            --bg-body: #f0f4f8; /* Soft grayish blue */
            --bg-card: #ffffff; 
            --bg-input: #f8fafc; 
            --bg-section: #f8fafc; 
            --text-main: #334155; /* Slate */
            --text-sub: #64748b; 
            --text-brand: #0f172a; 
            --border-line: #cbd5e1; 
            --border-focus: #3b82f6; /* Soft Blue */
            --primary: #3b82f6; /* Soft Blue Primary */
            --primary-grad: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
            --accent: #f59e0b; 
            --success: #10b981; 
            --danger: #ef4444; 
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.1); 
            --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.1); 
            --shadow-btn: 0 4px 14px 0 rgba(59, 130, 246, 0.35);
        }

        /* --- PALET DARK MODE --- */
        .dark-mode {
            --bg-body: #0f172a; 
            --bg-card: #1e293b; 
            --bg-input: #334155; 
            --bg-section: #1e293b; 
            --text-main: #f8fafc; 
            --text-sub: #94a3b8; 
            --text-brand: #ffffff; 
            --border-line: #475569; 
            --border-focus: #60a5fa;
            --primary: #60a5fa; 
            --primary-grad: linear-gradient(135deg, #3b82f6 0%, #93c5fd 100%);
            --shadow-btn: 0 4px 14px 0 rgba(96, 165, 250, 0.2);
        }

        /* --- GLOBAL STYLING --- */
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg-body); 
            margin: 0; 
            padding-bottom: 100px; /* Jarak untuk floating button di bawah */
            font-size: 14px; 
            color: var(--text-main); 
            transition: background-color 0.3s, color 0.3s; 
        }

        /* --- HEADER STYLING --- */
        .header { 
            background: var(--bg-card); 
            border-bottom: 3px solid var(--primary); 
            box-shadow: var(--shadow-md); 
            padding: 20px 15px; 
            transition: background-color 0.3s; 
        }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto; }
        .title-area { display: flex; flex-direction: column; }
        .main-title { font-weight: 900; color: var(--text-brand); font-size: 1.3rem; letter-spacing: 1px; }
        .sub-title { font-size: 10px; color: var(--text-sub); font-weight: bold; letter-spacing: 1.5px; margin-top: 4px; }
        .version-badge { background: var(--primary); color: white; padding: 2px 6px; border-radius: 4px; font-size: 9px; margin-left: 6px; font-weight: 900;}
        
        .theme-toggle { 
            background: var(--bg-body); 
            border: 1px solid var(--border-line); 
            color: var(--text-main); 
            border-radius: 6px; 
            padding: 6px 12px; 
            font-size: 11px; 
            font-weight: 800; 
            cursor: pointer; 
            box-shadow: var(--shadow-sm); 
            transition: all 0.2s; 
            letter-spacing: 1px;
        }

        /* --- FORM STYLING --- */
        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { 
            background: var(--bg-card); 
            border-radius: 10px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: var(--shadow-sm); 
            border: 1px solid var(--border-line); 
        }
        .card-header {
            border-bottom: 2px solid var(--primary); 
            padding-bottom: 8px; 
            margin-bottom: 15px; 
            font-size: 12px; 
            color: var(--primary); 
            font-weight: 800;
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 16px; }
        label { 
            display: block; 
            font-size: 11px; 
            font-weight: 800; 
            color: var(--text-sub); 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            letter-spacing: 0.5px; 
        }
        .req::after { content: " *"; color: var(--danger); font-size: 14px;}
        
        input { 
            width: 100%; 
            padding: 14px 12px; 
            border: 1px solid var(--border-line); 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px; 
            font-weight: 600; 
            background: var(--bg-input); 
            color: var(--text-main); 
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { 
            border-color: var(--border-focus); 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); 
        }
        
        /* Input File Khusus agar terlihat modern */
        input[type="file"] {
            padding: 10px;
            background: var(--bg-section);
            border: 1px dashed var(--border-line);
            cursor: pointer;
        }

        /* --- LAYOUT GRID --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; gap: 12px; }
        }

        /* --- FLOATING ACTION BUTTON --- */
        .action-buttons { 
            position: fixed; 
            bottom: 15px; 
            left: 15px; 
            right: 15px; 
            max-width: 770px; 
            margin: 0 auto; 
            z-index: 1000; 
        }
        .btn-server { 
            background: var(--primary-grad); 
            box-shadow: var(--shadow-btn); 
            font-size: 14px; 
            width: 100%; 
            padding: 16px;
            border: none; 
            border-radius: 8px; 
            font-weight: 900; 
            cursor: pointer; 
            color: white; 
            letter-spacing: 1px;
            text-align: center;
        }
        .btn-server:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* --- LOADING OVERLAY --- */
        #loading { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.9); 
            color: white; 
            z-index: 2000; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px; 
            font-weight: bold; 
            flex-direction: column; 
            text-align: center; 
            backdrop-filter: blur(4px); 
            letter-spacing: 1px;
        }
        .spinner { 
            border: 4px solid rgba(255,255,255,0.1); 
            border-top: 4px solid var(--primary); 
            border-radius: 50%; 
            width: 50px; height: 50px; 
            animation: spin 1s linear infinite; 
            margin-bottom: 20px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">MENGIRIM LAPORAN FOTO...</div>
</div>

<div class="header">
    <div class="header-content">
        <div class="title-area">
            <div class="main-title">SAMPLE PHOTO REPORT</div>
            <div class="sub-title">FORM UPLOAD FOTO <span class="version-badge">v2.0</span></div>
        </div>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" type="button">DARK</button>
    </div>
</div>

<form id="inspectionForm">
    <div class="container">
        
        <div class="card">
            <div class="card-header">DATA PRODUK</div>
            <div class="grid">
                <div class="input-group">
                    <label class="req">TANGGAL</label>
                    <input type="date" id="tanggal" required>
                </div>
                <div class="input-group">
                    <label class="req">BUYER</label>
                    <input type="text" id="buyer" placeholder="Masukkan nama buyer..." required>
                </div>
                <div class="input-group">
                    <label class="req">STYLE</label>
                    <input type="text" id="style" placeholder="Nomor/Nama Style..." required>
                </div>
                <div class="input-group">
                    <label class="req">COLOR</label>
                    <input type="text" id="color" placeholder="Warna produk..." required>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">LAMPIRAN FOTO FOTOGRAFI</div>
            
            <div class="input-group">
                <label>SAMPLE 1 - FRONT VIEW</label>
                <input type="file" id="file1" accept="image/*">
            </div>
            <div class="input-group">
                <label>SAMPLE 2 - BACK VIEW</label>
                <input type="file" id="file2" accept="image/*">
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <label>DEFECT 1 - DETAIL MASALAH</label>
                <input type="file" id="file3" accept="image/*">
            </div>
        </div>

    </div>

    <div class="action-buttons">
        <button type="submit" class="btn-server" id="submitBtn">CONFIRM & UPLOAD REPORT</button>
    </div>
</form>

<script>
    // 1. Logika Dark Mode seperti di Referensi
    function toggleTheme() { 
        document.body.classList.toggle('dark-mode'); 
        const isDark = document.body.classList.contains('dark-mode');
        document.getElementById('themeBtn').innerText = isDark ? 'LIGHT' : 'DARK'; 
        localStorage.setItem('themeStyle', isDark ? 'dark' : 'light'); 
    }

    // Cek memori HP untuk Dark Mode sebelumnya
    window.onload = () => {
        document.getElementById('tanggal').valueAsDate = new Date(); // Set tanggal otomatis
        if(localStorage.getItem('themeStyle') === 'dark') { 
            toggleTheme(); 
        } 
    };

    // 2. Logika Submit Data & Konversi Base64
    const form = document.getElementById('inspectionForm');
    const btn = document.getElementById('submitBtn');
    const loader = document.getElementById('loading');

    form.addEventListener('submit', async (e) => {
        e.preventDefault(); // Mencegah reload halaman
        
        // Cek koneksi backend
        if (typeof google === "undefined") {
            Swal.fire('Error', 'Google Apps Script tidak terdeteksi. Pastikan dibuka melalui link Web App resmi.', 'error');
            return;
        }

        // Tampilkan Loading
        btn.disabled = true;
        btn.innerText = "MEMPROSES DATA...";
        loader.style.display = 'flex';

        // Susun Data Payload
        const payload = {
            tanggal: document.getElementById('tanggal').value,
            buyer: document.getElementById('buyer').value.toUpperCase(),
            style: document.getElementById('style').value.toUpperCase(),
            color: document.getElementById('color').value.toUpperCase(),
            file1: await getFileData(document.getElementById('file1')),
            file2: await getFileData(document.getElementById('file2')),
            file3: await getFileData(document.getElementById('file3'))
        };

        // Kirim ke Code.gs
        google.script.run
            .withSuccessHandler((res) => {
                loader.style.display = 'none';
                btn.disabled = false;
                btn.innerText = "CONFIRM & UPLOAD REPORT";
                
                // Menggunakan SweetAlert pengganti Alert biasa agar selaras dengan tema
                Swal.fire({
                    title: 'Berhasil!',
                    text: 'Laporan dan Foto sukses diupload ke server.',
                    icon: 'success',
                    confirmButtonColor: '#3b82f6'
                }).then(() => {
                    form.reset();
                    document.getElementById('tanggal').valueAsDate = new Date();
                });
            })
            .withFailureHandler((err) => {
                loader.style.display = 'none';
                btn.disabled = false;
                btn.innerText = "CONFIRM & UPLOAD REPORT";
                Swal.fire('Gagal!', 'Terjadi kesalahan jaringan: ' + err.message, 'error');
            })
            .processForm(payload);
    });

    // 3. Fungsi konversi gambar ke Base64 (tetap sama dan dioptimalkan)
    async function getFileData(input) {
        const file = input.files[0];
        if (!file) return { size: 0 }; // Return kosong jika tidak ada foto di-upload
        
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                resolve({
                    base64: e.target.result.split(',')[1],
                    type: file.type,
                    name: file.name,
                    size: file.size
                });
            };
            reader.readAsDataURL(file);
        });
    }
</script>

</body>
</html>
