<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FORM SAMPLE PHOTO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --bg-body: #f0f4f8; --bg-card: #ffffff; --bg-input: #f8fafc; --bg-section: #f8fafc; 
            --text-main: #334155; --text-sub: #64748b; --text-brand: #0f172a; 
            --border-line: #cbd5e1; --border-focus: #3b82f6; 
            --primary: #3b82f6; --primary-grad: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%);
            --accent: #f59e0b; --success: #10b981; --danger: #ef4444; 
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.1); --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.1); 
            --shadow-btn: 0 4px 14px 0 rgba(59, 130, 246, 0.35);
        }
        .dark-mode {
            --bg-body: #0f172a; --bg-card: #1e293b; --bg-input: #334155; --bg-section: #1e293b; 
            --text-main: #f8fafc; --text-sub: #94a3b8; --text-brand: #ffffff; 
            --border-line: #475569; --border-focus: #60a5fa;
            --primary: #60a5fa; --primary-grad: linear-gradient(135deg, #3b82f6 0%, #93c5fd 100%);
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-body); margin: 0; padding-bottom: 120px; font-size: 14px; color: var(--text-main); transition: background-color 0.3s, color 0.3s; }
        .header { background: var(--bg-card); border-bottom: 3px solid var(--primary); box-shadow: var(--shadow-md); padding: 20px 15px; transition: background-color 0.3s; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto; }
        .title-area { display: flex; flex-direction: column; }
        .main-title { font-weight: 900; color: var(--text-brand); font-size: 1.3rem; letter-spacing: 1px; }
        .sub-title { font-size: 10px; color: var(--text-sub); font-weight: bold; letter-spacing: 1.5px; margin-top: 4px; }
        .version-badge { background: var(--primary); color: white; padding: 2px 6px; border-radius: 4px; font-size: 9px; margin-left: 6px; font-weight: 900;}
        .theme-toggle { background: var(--bg-body); border: 1px solid var(--border-line); color: var(--text-main); border-radius: 6px; padding: 6px 12px; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--bg-card); border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-line); }
        .card-header { border-bottom: 2px solid var(--primary); padding-bottom: 8px; margin-bottom: 15px; font-size: 12px; color: var(--primary); font-weight: 800; text-transform: uppercase; }
        .input-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        .req::after { content: " *"; color: var(--danger); font-size: 14px;}
        input { width: 100%; padding: 14px 12px; border: 1px solid var(--border-line); border-radius: 6px; box-sizing: border-box; font-size: 14px; font-weight: 600; background: var(--bg-input); color: var(--text-main); transition: border-color 0.2s; }
        input:focus { border-color: var(--border-focus); outline: none; box-shadow: 0 0 0 3px rgba(39, 130, 246, 0.15); }
        input[type="file"] { padding: 10px; background: var(--bg-section); border: 1px dashed var(--border-line); cursor: pointer; }
        .btn-add-defect { background: var(--bg-body); color: var(--primary); border: 2px dashed var(--primary); padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; gap: 12px; } }
        .action-buttons { position: fixed; bottom: 15px; left: 15px; right: 15px; max-width: 770px; margin: 0 auto; z-index: 1000; }
        .btn-server { background: var(--primary-grad); box-shadow: var(--shadow-btn); font-size: 14px; width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; color: white; letter-spacing: 1px; text-align: center; }
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); color: white; z-index: 2000; align-items: center; justify-content: center; font-size: 14px; flex-direction: column; backdrop-filter: blur(4px); }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .summary-table { width: 100%; text-align: left; font-size: 13px; margin-top: 10px; border-collapse: collapse; }
        .summary-table th { color: var(--text-sub); padding: 6px 0; border-bottom: 1px solid var(--border-line); width: 35%; }
        .summary-table td { color: var(--text-brand); padding: 6px 0; font-weight: bold; border-bottom: 1px solid var(--border-line); }
    </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div id="loading-text">MEMPROSES LAPORAN...</div></div>

<div class="header">
    <div class="header-content">
        <div class="title-area">
            <div class="main-title">SAMPLE PHOTO REPORT</div>
            <div style="font-size: 10px; color: var(--text-sub); font-weight: bold; letter-spacing: 1.5px; margin-top: 4px;">AUTOMATIC SYSTEM <span class="version-badge">v1.0</span></div>
        </div>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" type="button">DARK</button>
    </div>
</div>

<form id="inspectionForm">
    <div class="container">
        <div class="card">
            <div class="card-header">DATA PRODUK</div>
            <div class="grid">
                <div class="input-group"><label class="req">TANGGAL</label><input type="date" id="tanggal" required></div>
                <div class="input-group"><label class="req">BUYER</label><input type="text" id="buyer" placeholder="Masukkan buyer..." required></div>
                <div class="input-group"><label class="req">STYLE</label><input type="text" id="style" placeholder="Masukkan style..." required></div>
                <div class="input-group"><label class="req">COLOR</label><input type="text" id="color" placeholder="Masukkan warna..." required></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">LAMPIRAN FOTO FOTOGRAFI</div>
            <div class="input-group"><label>SAMPLE 1 - FRONT VIEW</label><input type="file" id="file1" accept="image/*"></div>
            <div class="input-group"><label>SAMPLE 2 - BACK VIEW</label><input type="file" id="file2" accept="image/*"></div>
            <hr style="border-color: var(--border-line); margin: 20px 0;">
            <div id="defect-container">
                <div class="input-group defect-item">
                    <label>DEFECT 1 - DETAIL MASALAH</label>
                    <input type="file" class="defect-file" accept="image/*">
                </div>
            </div>
            <button type="button" class="btn-add-defect" onclick="addDefectInput()">+ TAMBAH FOTO DEFECT LAINNYA</button>
        </div>
    </div>

    <div class="action-buttons">
        <button type="submit" class="btn-server" id="submitBtn">CONFIRM & UPLOAD REPORT</button>
    </div>
</form>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxe_bqiHs0VeSLSoXPS8DsXWT3UCmc4YvF7OfcVmte4955MaEk-_sYTfUDKDR3qqDySXg/exec";

    function toggleTheme() { 
        document.body.classList.toggle('dark-mode'); 
        const isDark = document.body.classList.contains('dark-mode');
        document.getElementById('themeBtn').innerText = isDark ? 'LIGHT' : 'DARK'; 
        localStorage.setItem('themeStyle', isDark ? 'dark' : 'light'); 
    }

    window.onload = () => {
        document.getElementById('tanggal').valueAsDate = new Date(); 
        if(localStorage.getItem('themeStyle') === 'dark') { toggleTheme(); } 
    };

    let defectCount = 1;
    function addDefectInput() {
        defectCount++;
        const container = document.getElementById('defect-container');
        const html = `<div class="input-group defect-item" style="margin-top: 15px;"><label>DEFECT ${defectCount} - DETAIL MASALAH</label><input type="file" class="defect-file" accept="image/*"></div>`;
        container.insertAdjacentHTML('beforeend', html);
    }

    const form = document.getElementById('inspectionForm');
    const btn = document.getElementById('submitBtn');
    const loader = document.getElementById('loading');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const tgl = document.getElementById('tanggal').value;
        const buyer = document.getElementById('buyer').value.toUpperCase();
        const style = document.getElementById('style').value.toUpperCase();
        const color = document.getElementById('color').value.toUpperCase();
        const defectInputs = document.querySelectorAll('.defect-file');
        let filledDefects = 0;
        for(let i=0; i<defectInputs.length; i++) { if(defectInputs[i].files.length > 0) filledDefects++; }

        const konfirmasi = await Swal.fire({
            title: 'Kirim Laporan?',
            html: `<table class="summary-table">
                    <tr><th>TANGGAL</th><td>${tgl}</td></tr>
                    <tr><th>BUYER</th><td>${buyer}</td></tr>
                    <tr><th>STYLE</th><td style="color:#3b82f6;">${style}</td></tr>
                    <tr><th>COLOR</th><td>${color}</td></tr>
                    <tr><th>DEFECT</th><td style="color:#ef4444;">${filledDefects} Foto Terlampir</td></tr>
                </table>`,
            icon: 'info', showCancelButton: true, confirmButtonColor: '#3b82f6', cancelButtonColor: '#94a3b8', confirmButtonText: 'Ya, Kirim Data!', cancelButtonText: 'Cek Lagi'
        });

        if (!konfirmasi.isConfirmed) return;
        btn.disabled = true; btn.innerText = "UPLOADING..."; loader.style.display = 'flex';

        try {
            let defectBase64Array = [];
            for(let i=0; i<defectInputs.length; i++){
                let fileData = await getFileData(defectInputs[i]);
                if(fileData && fileData.size > 0) defectBase64Array.push(fileData);
            }
            const payload = {
                tanggal: tgl, buyer: buyer, style: style, color: color,
                file1: await getFileData(document.getElementById('file1')),
                file2: await getFileData(document.getElementById('file2')),
                defects: defectBase64Array 
            };
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            const result = await response.json();
            if (result.result === "success") {
                loader.style.display = 'none'; btn.disabled = false; btn.innerText = "CONFIRM & UPLOAD REPORT";
                Swal.fire({ title: 'Berhasil!', text: 'Laporan sukses diupload.', icon: 'success', confirmButtonColor: '#3b82f6' })
                .then(() => {
                    form.reset(); document.getElementById('tanggal').valueAsDate = new Date();
                    document.getElementById('defect-container').innerHTML = `<div class="input-group defect-item"><label>DEFECT 1 - DETAIL MASALAH</label><input type="file" class="defect-file" accept="image/*"></div>`;
                    defectCount = 1;
                });
            } else { throw new Error(result.message); }
        } catch (error) {
            loader.style.display = 'none'; btn.disabled = false; btn.innerText = "CONFIRM & UPLOAD REPORT";
            Swal.fire('Gagal!', 'Error: ' + error.message, 'error');
        }
    });

    async function getFileData(input) {
        const file = input.files[0];
        if (!file) return { size: 0 }; 
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    // Target kompresi ~400KB dengan resolusi yang memadai
                    const MAX_SIZE = 1200; 
                    let width = img.width, height = img.height;
                    
                    // Menjaga rasio asli (tidak gepeng)
                    if (width > height) { 
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                    } else { 
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } 
                    }
                    
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Kualitas 0.7 untuk mencapai ~400KB
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7); 
                    const base64String = compressedDataUrl.split(',')[1];
                    
                    resolve({ 
                        base64: base64String, 
                        type: 'image/jpeg', 
                        name: file.name, 
                        size: Math.round(base64String.length * (3/4)),
                        width: width,     // Kirim ukuran lebar asli
                        height: height    // Kirim ukuran tinggi asli
                    });
                };
            };
        });
    }
</script>
</body>
</html>
